name: refresh

# Schedule disabled — Sofascore on Cloudflare 403s every GitHub Actions
# egress IP regardless of TLS/headers, and a free Cloudflare Worker proxy
# would be the unblocker but new accounts' workers.dev SSL provisioning
# is currently stuck. Local launchd job on the user's Mac runs the cron
# instead. Re-enable schedule once a working proxy is in place — set
# SOFASCORE_PROXY_BASE secret and uncomment the cron line below.
on:
  # schedule:
  #   - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (don't write to calendar)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TARGET_CALENDAR_ID: ${{ secrets.TARGET_CALENDAR_ID }}
          BUSY_CALENDAR_IDS: ${{ secrets.BUSY_CALENDAR_IDS }}
          BUSY_ICS_URLS: ${{ secrets.BUSY_ICS_URLS }}
          SOFASCORE_PROXY_BASE: ${{ secrets.SOFASCORE_PROXY_BASE }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m string_theory.main --dry-run
          else
            python -m string_theory.main
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pytest -q
